<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>About – Google Messages</title>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b27;
    --border:  #21293d;
    --accent:  #3a8eff;
    --glow:    rgba(58,142,255,0.18);
    --text:    #e2e8f0;
    --dim:     #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Custom Title Bar */
  .title-bar {
    -webkit-app-region: drag;
    height: 32px;
    background: transparent;
    color: var(--text);
    display: flex;
    align-items: center;
    padding-left: 12px;
    font-size: 12px;
    font-family: "Segoe UI", system-ui, sans-serif;
    user-select: none;
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 9999;
  }
  .title-bar-close {
    -webkit-app-region: no-drag;
    margin-left: auto;
    width: 46px;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: default;
    font-size: 14px;
    font-family: "Segoe MDL2 Assets", sans-serif;
  }
  .title-bar-close:hover {
    background: #e81123;
    color: white;
  }

  body {
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 60px 30px 30px 30px;
    border: 1px solid var(--border);
    overflow: hidden;
    user-select: none;
    height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    top: -60px; left: 50%;
    transform: translateX(-50%);
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(58,142,255,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  .icon-wrap {
    width: 72px; height: 72px;
    border-radius: 20px;
    background: linear-gradient(135deg, #1a5fd4 0%, #3a8eff 100%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 28px var(--glow), 0 2px 8px rgba(0,0,0,0.5);
    margin-bottom: 14px;
    flex-shrink: 0;
  }
  .icon-wrap svg { width: 40px; height: 40px; fill: #fff; }

  h1 {
    font-size: 18px;
    font-weight: 600;
    color: #fff;
    letter-spacing: -0.2px;
    margin-bottom: 4px;
  }

  .tagline {
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 14px;
    text-align: center;
    line-height: 1.5;
  }

  .version {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 16px;
    letter-spacing: 0.4px;
  }
  .version-dot {
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    box-shadow: 0 0 5px var(--accent);
  }

  /* Info card — no inner dividers, just clean rows */
  .info-card {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .info-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 9px 14px;
    font-size: 12px;
    border-bottom: 1px solid var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--dim); }
  .info-value { color: var(--text); font-weight: 500; text-align: right; }

  .btn-row {
    display: flex;
    gap: 8px;
    width: 100%;
  }
  .btn {
    flex: 1;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    padding: 9px 14px;
    cursor: pointer;
    transition: filter 0.12s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 3px 12px var(--glow); }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--dim); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }

  .footer {
    margin-top: 12px;
    font-size: 10px;
    color: var(--dim);
    text-align: center;
    line-height: 1.8;
  }
  .footer a { color: var(--dim); text-decoration: none; }
  .footer a:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="title-bar">
  <img src="icon.png" width="16" height="16" style="margin-right: 8px;" alt="icon">
  <span>About ‒ Google Messages</span>
  <div class="title-bar-close" onclick="window.pywebview ? window.pywebview.api.close_about() : window.close()">&#x2715;</div>
</div>

<div class="icon-wrap">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
</div>

<h1>Google Messages Desktop</h1>
<p class="tagline">Native Windows client for Google Messages.</p>

<div class="version">
  <span class="version-dot"></span>
  Version 6.0.2
</div>

<div class="info-card">
  <div class="info-row">
    <span class="info-label">Engine</span>
    <span class="info-value">WebView2 (Chromium)</span>
  </div>
  <div class="info-row">
    <span class="info-label">Framework</span>
    <span class="info-value">pywebview 6.1 · Python 3.13</span>
  </div>
  <div class="info-row">
    <span class="info-label">Platform</span>
    <span class="info-value">Windows 10 / 11</span>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-ghost" id="btn-github"
    onclick="window.open('https://github.com/PatrickHusband/google-messages')">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2A10 10 0 002 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"/>
    </svg>
    GitHub
  </button>
  <button class="btn btn-primary" id="btn-close" onclick="window.pywebview ? window.pywebview.api.close_about() : window.close()">
    Close
  </button>
</div>

<div class="footer">
  Not affiliated with Google LLC. Android is a trademark of Google LLC.<br>
  <a href="#" onclick="window.open('https://messages.google.com/web/'); return false;">messages.google.com</a>
</div>

</body>
</html>
